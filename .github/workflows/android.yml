name: Eden Android Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v3

      - name: Grant permissions
        working-directory: ./src/android
        run: chmod +x gradlew || true

      - name: Build APK
        working-directory: ./src/android
        run: ./gradlew assembleRelease -Pandroid.injected.build.abi=arm64-v8a -Pandroid.download.missing.dependencies=true
