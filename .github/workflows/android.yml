name: Eden Android Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v3

      - name: Install Linux Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build ccache libgl1-mesa-dev git

      - name: Grant permissions
        working-directory: ./src/android
        run: chmod +x gradlew || true

      # Injetamos argumentos diretamente nas variáveis do CMake para suprimir erros de warning
      - name: Build APK
        working-directory: ./src/android
        run: |
          ./gradlew assembleRelease             -Pandroid.injected.build.abi=arm64-v8a             -Pandroid.download.missing.dependencies=true             -Pandroid.compileSdkVersion=34             -Pandroid.targetSdkVersion=33             -Pext.targetAbi=arm64-v8a             -Pandroid.disableAutomaticComponentCreation=true
