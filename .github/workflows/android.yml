name: Eden Android Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v3

      - name: Setup NDK r26d
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r26d

      - name: Configure NDK Path
        run: echo "ndk.dir=${{ steps.setup-ndk.outputs.ndk-path }}" > src/android/local.properties

      - name: Grant permissions
        working-directory: ./src/android
        run: chmod +x gradlew || true

      - name: Build APK
        working-directory: ./src/android
        run: ./gradlew assembleRelease -Pandroid.injected.build.abi=arm64-v8a

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: eden-apk
          path: src/android/app/build/outputs/**/*.apk
