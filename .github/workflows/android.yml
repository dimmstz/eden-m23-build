name: Eden Android Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v3

      - name: Update SDK Tools and Install NDK
        run: |
          # Atualiza o gerenciador para aceitar os XMLs novos do Google
          ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager --update
          ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager "ndk;26.2.13676358"
          echo "ndk.dir=${ANDROID_HOME}/ndk/26.2.13676358" > src/android/local.properties

      - name: Grant permissions
        working-directory: ./src/android
        run: chmod +x gradlew || true

      - name: Build APK
        working-directory: ./src/android
        run: ./gradlew assembleRelease -Pandroid.injected.build.abi=arm64-v8a

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: eden-apk
          path: src/android/app/build/outputs/**/*.apk
